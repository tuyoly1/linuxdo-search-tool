<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Linux.do 搜索融合台 Mobile</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="mobile-shell">
      <header class="mobile-top">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M10.8 4.4a6.4 6.4 0 0 1 5 10.4l3.9 3.9-1.5 1.5-3.9-3.9a6.4 6.4 0 1 1-3.5-11.9Zm0 2.1a4.3 4.3 0 1 0 0 8.6 4.3 4.3 0 0 0 0-8.6Z"></path>
            </svg>
          </div>
          <div>
            <h1>Linux.do 搜索融合台</h1>
            <p id="statusLine">移动版，优先帮你更快点到有效入口。</p>
          </div>
        </div>
        <div class="quick-actions">
          <button id="openBestBtn" class="btn primary" type="button">打开推荐</button>
          <button id="savePlanBtn" class="btn" type="button">保存</button>
        </div>
      </header>

      <section class="hero-panel">
        <label class="field main-field" for="topicInput">
          <span>想找什么</span>
          <textarea id="topicInput" rows="3" placeholder="例如：Claude Code Windows 配置"></textarea>
        </label>

        <div class="hero-grid">
          <label class="field" for="contextInput">
            <span>环境 / 限定词</span>
            <input id="contextInput" type="text" placeholder="config.toml / WSL / 代理">
          </label>
          <button id="toggleAdvancedBtn" class="btn ghost" type="button">高级筛选</button>
        </div>

        <div class="quick-strip" id="quickStrip" aria-label="常用限定词"></div>
      </section>

      <section class="metrics">
        <div class="metric">
          <strong id="cardCount">0</strong>
          <span>搜索卡</span>
        </div>
        <div class="metric">
          <strong id="keywordCount">0</strong>
          <span>关键词</span>
        </div>
        <div class="metric wide">
          <strong id="intentText">待输入</strong>
          <span>当前判断</span>
        </div>
      </section>

      <section id="advancedPanel" class="advanced-panel hidden">
        <div class="field-grid">
          <label class="field" for="datePreset">
            <span>时间范围</span>
            <select id="datePreset">
              <option value="none">不限时间</option>
              <option value="30">最近 30 天</option>
              <option value="90" selected>最近 90 天</option>
              <option value="180">最近半年</option>
              <option value="365">最近一年</option>
              <option value="custom">自定义日期后</option>
            </select>
          </label>
          <label class="field custom-date hidden" for="customAfter">
            <span>起始日期</span>
            <input id="customAfter" type="date">
          </label>
        </div>

        <div class="toggle-row">
          <label class="toggle">
            <input id="exactToggle" type="checkbox">
            <span>精确短语</span>
          </label>
          <label class="toggle">
            <input id="cleanToggle" type="checkbox" checked>
            <span>排除水帖</span>
          </label>
          <label class="toggle">
            <input id="commentsToggle" type="checkbox" checked>
            <span>评论反馈</span>
          </label>
        </div>
      </section>

      <section class="priority-panel">
        <div class="section-head">
          <h2>优先入口</h2>
          <button id="copyPriorityBtn" class="text-btn" type="button">复制</button>
        </div>
        <div id="priorityList" class="priority-list"></div>
      </section>

      <section class="result-tools">
        <div id="categoryTabs" class="tabs"></div>
        <div class="tool-row">
          <button id="copyVisibleBtn" class="btn" type="button">复制当前</button>
          <button id="resetBtn" class="btn ghost" type="button">重置</button>
        </div>
      </section>

      <section class="results">
        <div id="emptyState" class="empty-state">
          <h2>先输入一个问题</h2>
          <p>移动版会先把最值得点的入口放到前面。</p>
        </div>
        <div id="cardsGrid" class="cards-grid"></div>
      </section>

      <section class="history-panel">
        <div class="section-head">
          <h2>搜索记录</h2>
          <button id="clearHistoryBtn" class="text-btn" type="button">清空</button>
        </div>
        <div id="historyList" class="history-list"></div>
      </section>

      <section class="checklist-panel">
        <div class="section-head">
          <h2>检索清单</h2>
          <button id="copyTemplateBtn" class="text-btn" type="button">复制</button>
        </div>
        <pre id="questionTemplate" class="template-box"></pre>
      </section>
    </main>

    <section id="copyFallback" class="copy-fallback hidden" role="dialog" aria-modal="true" aria-labelledby="copyFallbackTitle">
      <div class="copy-fallback-panel">
        <div class="section-head">
          <h2 id="copyFallbackTitle">手动复制</h2>
          <button id="closeFallbackBtn" class="text-btn" type="button">关闭</button>
        </div>
        <textarea id="fallbackText" readonly></textarea>
      </div>
    </section>

    <script src="./app.js" defer></script>
  </body>
</html>
